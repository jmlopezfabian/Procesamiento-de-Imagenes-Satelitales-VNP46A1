<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="Georgia, serif" font-size="13">

  <!-- Background -->
  <rect width="680" height="620" fill="#161b22"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7d8590"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7d8590"/>
    </marker>
  </defs>

  <!-- Step 1: GeoJSON Polygon -->
  <rect x="210" y="20" width="260" height="56" rx="6" fill="#1c2b3a" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="340" y="44" text-anchor="middle" font-weight="bold" fill="#e6edf3">1. Polígono GeoJSON</text>
  <text x="340" y="62" text-anchor="middle" font-size="11" fill="#7d8590">límite geográfico del municipio</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="76" x2="340" y2="108" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Coordinate Transform -->
  <rect x="210" y="110" width="260" height="70" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="133" text-anchor="middle" font-weight="bold" fill="#e6edf3">2. Transformación de coordenadas</text>
  <text x="340" y="151" text-anchor="middle" font-size="11" fill="#7d8590" font-style="italic">x = (lon − lon₀) / rₓ</text>
  <text x="340" y="168" text-anchor="middle" font-size="11" fill="#7d8590" font-style="italic">y = (lat₀ − lat) / r_y</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="180" x2="340" y2="212" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Border completion -->
  <rect x="210" y="214" width="260" height="70" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="237" text-anchor="middle" font-weight="bold" fill="#e6edf3">3. Cierre de bordes</text>
  <text x="340" y="255" text-anchor="middle" font-size="11" fill="#7d8590">interpolación lineal entre vértices</text>
  <text x="340" y="272" text-anchor="middle" font-size="11" fill="#7d8590">cuando dist(pᵢ, pᵢ₊₁) &gt; 1 px</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="284" x2="340" y2="316" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Centroid + BFS -->
  <rect x="210" y="318" width="260" height="70" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="341" text-anchor="middle" font-weight="bold" fill="#e6edf3">4. Flood fill desde centroide</text>
  <text x="340" y="359" text-anchor="middle" font-size="11" fill="#7d8590">BFS 4-conexo desde centroide</text>
  <text x="340" y="376" text-anchor="middle" font-size="11" fill="#7d8590">Shoelace → píxeles interiores</text>

  <!-- Arrow 4→5 -->
  <line x1="340" y1="388" x2="340" y2="420" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Orphan pixels -->
  <rect x="210" y="422" width="260" height="70" rx="6" fill="#1c2333" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="445" text-anchor="middle" font-weight="bold" fill="#e6edf3">5. Píxeles huérfanos</text>
  <text x="340" y="463" text-anchor="middle" font-size="11" fill="#7d8590">flood fill inverso desde bordes</text>
  <text x="340" y="480" text-anchor="middle" font-size="11" fill="#7d8590">de imagen → zonas no alcanzadas</text>

  <!-- Arrow 5→6 -->
  <line x1="340" y1="492" x2="340" y2="524" stroke="#7d8590" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Statistics -->
  <rect x="180" y="526" width="320" height="70" rx="6" fill="#1c2b3a" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="340" y="549" text-anchor="middle" font-weight="bold" fill="#e6edf3">6. Métricas estadísticas</text>
  <text x="340" y="567" text-anchor="middle" font-size="11" fill="#7d8590">N, Σ, μ, σ, max, min, P₂₅, P₅₀, P₇₅</text>
  <text x="340" y="584" text-anchor="middle" font-size="11" fill="#58a6ff">→ Conjunto de datos NTL</text>

  <!-- HDF5 source box (side) -->
  <rect x="20" y="214" width="160" height="56" rx="6" fill="#211a07" stroke="#bb8800" stroke-width="1.5"/>
  <text x="100" y="237" text-anchor="middle" font-weight="bold" fill="#e6edf3">HDF5 VNP46A1</text>
  <text x="100" y="255" text-anchor="middle" font-size="11" fill="#7d8590">2400×2400 píxeles</text>
  <text x="100" y="272" text-anchor="middle" font-size="11" fill="#7d8590">radianza nocturna</text>

  <!-- Arrow HDF5 → Step 2 -->
  <line x1="180" y1="242" x2="208" y2="242" stroke="#7d8590" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dash)"/>

  <!-- NASA download label -->
  <text x="100" y="200" text-anchor="middle" font-size="10" fill="#7d8590">descarga LAADS DAAC</text>
  <line x1="100" y1="204" x2="100" y2="212" stroke="#7d8590" stroke-width="1" marker-end="url(#arrow)"/>

</svg>
