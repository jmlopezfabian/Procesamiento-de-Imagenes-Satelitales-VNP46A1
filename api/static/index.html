<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNP46A1 Satellite API</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --error: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1.5rem 0; }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.75rem 0; color: var(--accent); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 6px;
    }
    .tabs button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .tabs button:hover:not(.active) { background: var(--border); }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    label { display: block; margin-bottom: 0.25rem; color: var(--muted); font-size: 0.9rem; }
    input, select, button {
      font-size: 1rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    input, select { background: var(--bg); color: var(--text); margin-bottom: 1rem; }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row > div { flex: 1; min-width: 140px; }
    .status { padding: 0.75rem; border-radius: 6px; margin-top: 1rem; font-family: monospace; font-size: 0.85rem; }
    .status.running { background: rgba(88, 166, 255, 0.15); border: 1px solid var(--accent); }
    .status.completed { background: rgba(63, 185, 80, 0.15); border: 1px solid var(--success); }
    .status.failed { background: rgba(248, 81, 73, 0.15); border: 1px solid var(--error); }
    #results pre, #matrizResult pre {
      background: var(--bg);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
    }
    .msg { color: var(--muted); font-size: 0.9rem; }
    .heatmap-wrap { margin: 1rem 0; }
    .heatmap-wrap canvas {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid var(--border);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .heatmap-legend-bar {
      height: 12px;
      border-radius: 4px;
      min-width: 120px;
    }
    details { margin-top: 1rem; }
    details summary { cursor: pointer; color: var(--accent); }
  </style>
</head>
<body>
  <h1>VNP46A1 Satellite API</h1>
  <div class="tabs">
    <button class="active" data-tab="jobs">Mediciones (jobs)</button>
    <button data-tab="matriz">Matriz radianza</button>
  </div>

  <div id="jobs" class="panel active card">
    <h2>Procesar mediciones</h2>
    <p class="msg">Crea un job para obtener estadísticas de radianza por municipio en un rango de fechas.</p>
    <label>Municipios</label>
    <select id="jobMunicipios" multiple style="min-height: 80px;"></select>
    <div class="form-row">
      <div>
        <label>Fecha inicio</label>
        <input type="date" id="jobFechaInicio" value="2024-01-01">
      </div>
      <div>
        <label>Fecha fin</label>
        <input type="date" id="jobFechaFin" value="2024-01-03">
      </div>
    </div>
    <button id="btnCreateJob">Crear job</button>
    <div id="jobStatus" class="status" style="display:none;"></div>
    <div id="results" style="margin-top:1rem;"></div>
  </div>

  <div id="matriz" class="panel card">
    <h2>Matriz de radianza</h2>
    <p class="msg">Obtén la matriz de radianza y la máscara binaria del municipio para una fecha.</p>
    <div class="form-row">
      <div>
        <label>Municipio</label>
        <select id="matrizMunicipio"></select>
      </div>
      <div>
        <label>Fecha</label>
        <input type="date" id="matrizFecha" value="2024-01-15">
      </div>
    </div>
    <button id="btnCreateMatriz">Crear job matriz</button>
    <div id="matrizStatus" class="status" style="display:none;"></div>
    <div id="matrizResult" style="margin-top:1rem;"></div>
  </div>

  <script>
    const API = '';
    async function api(path, opts = {}) {
      const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || JSON.stringify(err));
      }
      return r.status === 204 ? null : r.json();
    }

    async function loadMunicipios() {
      const { municipios } = await api('/municipios');
      const sel = document.getElementById('jobMunicipios');
      const selM = document.getElementById('matrizMunicipio');
      municipios.forEach(m => {
        sel.add(new Option(m, m));
        selM.add(new Option(m, m));
      });
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      };
    });

    document.getElementById('btnCreateJob').onclick = async () => {
      const sel = document.getElementById('jobMunicipios');
      const selected = [...sel.selectedOptions].map(o => o.value);
      if (!selected.length) { alert('Selecciona al menos un municipio'); return; }
      const fechaInicio = document.getElementById('jobFechaInicio').value;
      const fechaFin = document.getElementById('jobFechaFin').value;
      const el = document.getElementById('jobStatus');
      const res = document.getElementById('results');
      res.innerHTML = '';
      el.style.display = 'block';
      el.className = 'status running';
      el.textContent = 'Creando job...';
      try {
        const job = await api('/jobs', {
          method: 'POST',
          body: JSON.stringify({ municipios: selected, fecha_inicio: fechaInicio, fecha_fin: fechaFin }),
        });
        el.textContent = `Job ${job.job_id.slice(0, 8)}... — ${job.status}`;
        const poll = async () => {
          const st = await api(`/jobs/${job.job_id}`);
          el.className = 'status ' + st.status;
          el.textContent = `${st.job_id.slice(0, 8)}... — ${st.status} ${st.progress || ''}`.trim();
          if (st.status === 'completed') {
            const data = await api(`/jobs/${job.job_id}/results`);
            res.innerHTML = '<h3>Resultados</h3><pre>' + JSON.stringify(data.results, null, 2) + '</pre>';
          } else if (st.status === 'failed') {
            res.innerHTML = '<p style="color:var(--error)">Error: ' + (st.error || '') + '</p>';
          } else {
            setTimeout(poll, 2500);
          }
        };
        poll();
      } catch (e) {
        el.className = 'status failed';
        el.textContent = 'Error: ' + e.message;
      }
    };

    document.getElementById('btnCreateMatriz').onclick = async () => {
      const municipio = document.getElementById('matrizMunicipio').value;
      const fecha = document.getElementById('matrizFecha').value;
      const el = document.getElementById('matrizStatus');
      const res = document.getElementById('matrizResult');
      res.innerHTML = '';
      el.style.display = 'block';
      el.className = 'status running';
      el.textContent = 'Creando job matriz...';
      try {
        const job = await api('/matriz', {
          method: 'POST',
          body: JSON.stringify({ municipio, fecha }),
        });
        el.textContent = `Job ${job.job_id.slice(0, 8)}... — ${job.status}`;
        const poll = async () => {
          const st = await api(`/matriz/${job.job_id}`);
          el.className = 'status ' + st.status;
          el.textContent = `${st.job_id.slice(0, 8)}... — ${st.status} ${st.progress || ''}`.trim();
          if (st.status === 'completed') {
            const data = await api(`/matriz/${job.job_id}/resultado`);
            res.innerHTML = '<h3>Resultado</h3>';
            renderHeatmap(data.radiance_matrix, data.municipality_mask, res);
            const summary = document.createElement('details');
            summary.innerHTML = '<summary>Metadata y datos crudos</summary><pre>' +
              JSON.stringify({ municipio: data.municipio, fecha: data.fecha, bbox: data.bbox, rows: data.rows, cols: data.cols }, null, 2) +
              '\n\nradiance_matrix (muestra): ' + JSON.stringify(data.radiance_matrix.slice(0, 3).map(r => r?.slice(0, 5))) +
              '\n\nmunicipality_mask (muestra): ' + JSON.stringify(data.municipality_mask?.slice(0, 3).map(r => r?.slice(0, 5))) + '</pre>';
            res.appendChild(summary);
          } else if (st.status === 'failed') {
            res.innerHTML = '<p style="color:var(--error)">Error: ' + (st.error || '') + '</p>';
          } else {
            setTimeout(poll, 2500);
          }
        };
        poll();
      } catch (e) {
        el.className = 'status failed';
        el.textContent = 'Error: ' + e.message;
      }
    };

    function radianceToColor(v, min, max) {
      if (v == null || (typeof v === 'number' && !Number.isFinite(v))) return [40, 40, 50];
      const t = max > min ? (v - min) / (max - min) : 0;
      const t2 = Math.max(0, Math.min(1, t));
      const r = Math.round(59 + (252 - 59) * t2);
      const g = Math.round(76 + (229 - 76) * t2);
      const b = Math.round(172 + (56 - 172) * t2);
      return [r, g, b];
    }

    function renderHeatmap(radianceMatrix, municipalityMask, container, cellSize = 8) {
      const rows = radianceMatrix.length;
      const cols = radianceMatrix[0]?.length || 0;
      if (!rows || !cols) return;

      let min = Infinity, max = -Infinity;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const v = radianceMatrix[r][c];
          if (v != null && Number.isFinite(v)) {
            min = Math.min(min, v);
            max = Math.max(max, v);
          }
        }
      }
      if (min === Infinity) min = 0;
      if (max === -Infinity) max = 1;

      const w = cols * cellSize;
      const h = rows * cellSize;
      const scale = Math.min(1, 400 / Math.max(w, h));
      const cw = Math.round(w * scale);
      const ch = Math.round(h * scale);
      const px = cw / cols;
      const py = ch / rows;

      const canvas = document.createElement('canvas');
      canvas.width = cw;
      canvas.height = ch;
      const ctx = canvas.getContext('2d');

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const [rr, gg, bb] = radianceToColor(radianceMatrix[r][c], min, max);
          ctx.fillStyle = `rgb(${rr},${gg},${bb})`;
          ctx.fillRect(c * px, r * py, Math.ceil(px) + 1, Math.ceil(py) + 1);
          if (municipalityMask && municipalityMask[r] && municipalityMask[r][c] === 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(c * px, r * py, Math.ceil(px) + 1, Math.ceil(py) + 1);
          }
        }
      }

      const wrap = document.createElement('div');
      wrap.className = 'heatmap-wrap';
      wrap.innerHTML = '<p class="msg">Matriz de radianza (azul= bajo, amarillo= alto). Píxeles fuera del municipio atenuados.</p>';
      wrap.appendChild(canvas);
      const legend = document.createElement('div');
      legend.className = 'heatmap-legend';
      legend.innerHTML = `<span>${min.toFixed(1)}</span><div class="heatmap-legend-bar" style="background:linear-gradient(to right,rgb(59,76,172),rgb(252,229,56))"></div><span>${max.toFixed(1)} nW/(cm²·sr)</span>`;
      wrap.appendChild(legend);
      container.appendChild(wrap);
    }

    loadMunicipios().catch(e => alert('No se pudo cargar municipios: ' + e.message));
  </script>
</body>
</html>
